<html>
<body>
<style>
body {
background: ;
}
img {
border-radius: 8px;

}
img::before {
	-webkit-animation: test 6s infinite;
	animation: test 6s infinite;
}
@-webkit-keyframes img {
	100% {
		left: 50%;
	}
}
@keyframes img {
	100% {
		left: 50%;
	}
}
img
{
     animation: Test 6s;
}
@keyframes Test {
    0%{opacity: 1;}
    50%{opacity: 0;}
    100%{opacity: 1;}
    
}
#container {
position: relative;
display: block;
margin: auto;
background: ;
width: 190px;
height: 260px;
  /* Définition de l'animation : nom, durée, courbe de vitesse, répétition */
  animation: vibrer 0.5s linear ;
  
  /* Optionnel : pour centrer l'animation autour de l'image */
  transform-origin: center; 
}

@keyframes vibrer {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  10% { transform: translate(-1px, -2px) rotate(-1deg); }
  20% { transform: translate(-3px, 0px) rotate(1deg); }
  30% { transform: translate(3px, 2px) rotate(0deg); }
  40% { transform: translate(1px, -1px) rotate(1deg); }
  50% { transform: translate(-1px, 2px) rotate(-1deg); }
  60% { transform: translate(-3px, 1px) rotate(0deg); }
  70% { transform: translate(3px, 1px) rotate(-1deg); }
  80% { transform: translate(-1px, -1px) rotate(1deg); }
  90% { transform: translate(1px, 2px) rotate(0deg); }
  100% { transform: translate(1px, -2px) rotate(-1deg); }
}
</style>
<div id="container"></div>
<script src="leatoire.js"></script> 
</div>
</body>
</html>
